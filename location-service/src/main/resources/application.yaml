spring:
  application:
    name: location-service

#  db connection
  datasource:
    url: jdbc:postgresql://localhost:5432/ca_connect_db
    username: postgres
    password: ${DB_PASSWORD}
    
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# eureka client config
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka

# port configuration
server:
  port: 8082

# OpenCage Geocoding API
geoCage:
  api:
    key: ${GEO_CAGE_API_KEY}